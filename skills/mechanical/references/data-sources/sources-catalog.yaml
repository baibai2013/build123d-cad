# ======================================================================
# 全局提取流程：从 SW 库源 → parts-lib YAML + .py
# ======================================================================
_parts_lib_extraction_pipeline:
  description: |
    从 SW 库（McMaster/SKF/MISUMI/TraceParts 等）提取零件参数
    → 写入 parts-lib YAML（几何单一真相）
    → 写 .py 工厂函数（build123d 实体）
    → 在 data-sources 写薄层元数据（来源 + 指针）

  step1_locate:
    goal: 找到该类别的权威源页面
    how: |
      1. 查本文件对应类别的 priority_sources，按 confidence 从高到低尝试
      2. 优先 WebFetch 产品页（比 WebSearch 精准），URL 从 priority_sources 的 url 字段推导
      3. 找不到时再用 websearch_prompts 里的模板搜索

  step2_extract_params:
    goal: 提取必须字段（见各类别 key_params）
    how_webfetch: |
      WebFetch 产品页 → 解析 Specifications / Dimensions / Technical Data 表格
      McMaster 典型路径：产品页 → "Specifications" tab → 尺寸表
      SKF 典型路径：产品页 → "Basic dimensions" 表格
      MISUMI 典型路径：产品页 → "Dimensional Drawing" tab
    how_step: |
      若有 STEP 文件（McMaster/TraceParts/GrabCAD 可下载）：
      1. import_step() 导入 OCP 查看
      2. 按各类别 extraction_hints.step_file 量取关键尺寸
      3. STEP 量取值作为验证，产品页参数为主
    how_pdf: |
      若只有 PDF datasheet：
      1. WebFetch PDF URL（返回文本）→ 搜索尺寸表
      2. 找三视图标注值（通常以 mm 为单位的浮点数）
    confidence_rule: |
      厂商官方页面 / ISO 标准 → confidence: 5
      权威第三方数据库（servodatabase / McMaster） → confidence: 4
      社区 STEP 量取 / 非官方来源 → confidence: 3
      仅单一非权威来源 → confidence: 2，必须在 notes 标注"未二次验证"

  step3_write_parts_lib_yaml:
    goal: 在 parts-lib 建参数 YAML（几何单一真相）
    target: build123d-parts-lib/build123d_parts_lib/parts/<category>/<part_id_lower>.yaml
    schema: 见各类别 parts_lib_yaml_schema 字段
    rules:
      - 只存几何参数，不存 source metadata（source 留在 data-sources）
      - 所有尺寸字段同级写 unit: mm（显式，避免英制混淆）
      - 浮点数保留 1 位小数（0.1mm 精度足够装配用途）
      - 列表型字段（如 common_lengths_mm）用 YAML 内联列表

  step4_write_parts_lib_py:
    goal: 在 parts-lib 写工厂函数，从同目录 YAML 读参数
    target: build123d-parts-lib/build123d_parts_lib/parts/<category>/<part_id_lower>.py
    rules:
      - 文件头注释：Source / Standards / License / 简化程度说明
      - 从 YAML 读参数，不硬编码常量（参考 sg90.py 模式）
      - 导出 make_<part_id>() -> Part 工厂函数
      - 坐标约定：原点在几何中心 XY，Z=0 为安装基准面（底面或法兰面）
      - 简化原则：装配定位 + 干涉检查够用即可（见各类别 parts_lib_py_hint）
      - __main__ 块写 STEP 缓存逻辑（export_step → cache/<part_id>.step）
    read_yaml_pattern: |
      import yaml
      from pathlib import Path
      _SPEC = yaml.safe_load((Path(__file__).parent / "<part_id_lower>.yaml").read_text())

  step5_update_data_sources:
    goal: 在 data-sources 对应 YAML 写薄层元数据（来源溯源 + parts-lib 指针）
    target: references/data-sources/<category>.yaml
    schema: |
      <PART_ID>:
        aliases: [<alias1>, <alias2>, ...]
        category: <category>
        source:
          primary:       <URL>            # 本次查到参数的页面
          datasheet:     <PDF URL 或 "">
          confidence:    <1-5>
          last_verified: <YYYY-MM-DD>
        parts_lib:
          module:     build123d_parts_lib.parts.<category>.<filename>
          factory:    make_<part_id>
          cache_step: build123d_parts_lib/parts/<category>/cache/<part_id>.step
        notes: <量产公差 / 版本差异 / 使用注意>
    rules:
      - 不在此写几何尺寸（已在 parts-lib YAML 里）
      - parts_lib 字段必填，串联 data-sources ↔ parts-lib
      - 已有 parts_lib 的条目 confidence < 3 时下次使用前必须重新核实
