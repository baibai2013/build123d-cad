motors:
  description: 步进电机 / 无刷电机 / 直流电机
  priority_sources:
    - name: 厂商 datasheet（StepperOnline、Nanotec、Moons'）
      why: 一手 torque-speed + 机械尺寸
      confidence_if_cited: 5
    - name: NEMA 标准
      why: NEMA 17/23 外形尺寸有通用表（尾长除外）
      confidence_if_cited: 4
    - name: MISUMI Motors
      url: https://us.misumi-ec.com
      why: 可配置 + 参数表完整
      confidence_if_cited: 5
    - name: McMaster-Carr Motors
      url: https://www.mcmaster.com/motors
      why: STEP 文件 + 尺寸表
      confidence_if_cited: 4
  websearch_prompts:
    - '"NEMA 17" stepper motor dimensions frame size datasheet'
    - '<model> brushless motor dimensions filetype:pdf'
    - 'site:misumi.com <model> motor dimensions'
  key_params:
    - frame_w        # 外框宽（NEMA17=42.3mm）
    - body_l         # 电机体长（不同型号差异大）
    - mount_pitch    # 安装孔对角中心距
    - mount_hole_d   # 安装孔直径
    - boss_d         # 定位凸台直径
    - boss_h         # 定位凸台高度
    - shaft_d        # 输出轴径
    - shaft_l        # 输出轴伸出长度
  extraction_hints:
    stepperonline: |
      产品页 → Datasheet PDF → Frame Size / Shaft Diameter / Mounting Hole Pitch
      URL 规律：https://www.omc-stepperonline.com/...
    nema_standard: |
      NEMA 17 = 42.3mm frame，NEMA 23 = 57.1mm frame
      安装孔 4×M3，孔距 31.0mm（NEMA17）
      轴径 / 体长 → 查具体型号 datasheet
    misumi: |
      产品页 → Mechanical dimension tab → 全参数表（含 CAD 下载）
    step_file: |
      导入 OCP：
      1. 量 frame 边长（正方形截面） → frame_w
      2. 量法兰面安装孔对角中心距 → mount_pitch
      3. 量定位凸台直径/高度 → boss_d / boss_h
      4. 量轴径 / 伸出长度 → shaft_d / shaft_l
  parts_lib_yaml_schema: |
    # 路径：parts-lib/build123d_parts_lib/parts/motors/<part_id_lower>.yaml
    <PART_ID>:              # 例: NEMA17_42
      frame:
        width:  <float mm>   # 正方形边长
        length: <float mm>   # 电机体长（无轴）
        unit: mm
      mount:
        hole_pitch: <float mm>   # 安装孔对角中心距
        hole_d:     <float mm>   # 安装孔直径
        boss_d:     <float mm>   # 定位凸台直径
        boss_h:     <float mm>   # 定位凸台高度
      shaft:
        d: <float mm>
        l: <float mm>            # 伸出长度
        flat_w: <float mm>       # D 型轴平面宽（无则 0）
  parts_lib_py_hint: |
    # 几何简化：方形主体 + 前法兰圆盘 + 定位凸台 + 输出轴（圆柱或D型截面）
    # 不建定子/转子/绕组，安装孔建模（通孔减材）
    # 坐标：Z=0 法兰面，轴沿 +Z 伸出
    def make_nema17(body_length: float = 40.0) -> Part:

