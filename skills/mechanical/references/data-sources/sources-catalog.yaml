# Authoritative Sources Catalog —— 按类别整理的权威数据源 + WebSearch prompt 模板
# 查询脚本未命中具体条目时，回落到此文件的对应类别，输出 priority_sources 和 websearch_prompt。
#
# 每个类别额外包含：
#   key_params          — 必须从源提取的字段清单
#   extraction_hints    — 针对各 SW 库的提取操作说明
#   parts_lib_yaml_schema — 写入 parts-lib YAML 的模板
#   parts_lib_py_hint   — 写 .py 工厂函数的提示（几何简化原则 + 签名）
# 全局提取流程见文件末尾 _parts_lib_extraction_pipeline。
# 全局平台兜底链见 _platform_fallback_chain（类别 priority_sources 找不到时按此顺序继续查）。

# ======================================================================
# 全局平台兜底链
# 用法：类别 priority_sources 全部未命中时，按下列 order 依次尝试。
# AI 执行规则：
#   1. 先查当前类别的 priority_sources（最权威）
#   2. 未命中 → 按 _platform_fallback_chain 的 order 逐平台搜索
#   3. 每个平台先用 search_pattern 构造 WebSearch query
#   4. 命中后 WebFetch 具体产品页提取参数
#   5. 记录实际命中的平台到 data-sources YAML 的 source.primary
# ======================================================================
_platform_fallback_chain:
  description: |
    当类别 priority_sources 未命中时的跨平台兜底顺序。
    覆盖 SW Toolbox 内容（通过 3D ContentCentral）及主流标准件平台。

  platforms:
    - order: 1
      name: McMaster-Carr
      url: https://www.mcmaster.com
      search_pattern: 'site:mcmaster.com <part_name> dimensions'
      how: |
        1. WebSearch → 找产品页
        2. WebFetch 产品页 → Specifications tab → 尺寸表
        3. 约 80% 产品有 STEP/SolidWorks 原生文件可下载
      best_for: [fasteners, bearings, structural, power_transmission, springs, seals]
      confidence_if_cited: 5
      notes: 工程尺寸金标准；与实际采购件一致；STEP 文件最可靠

    - order: 2
      name: MISUMI
      url: https://us.misumi-ec.com
      search_pattern: 'site:misumi-ec.com <part_name> dimensions'
      how: |
        1. WebSearch → 找产品系列页
        2. WebFetch → Dimensional Drawing tab 或 Cross Section PDF
        3. 可配置件直接在 URL 参数里调规格
      best_for: [extrusions, linear_motion, fasteners, power_transmission, shafts]
      confidence_if_cited: 5
      notes: 精密机械标准件最全；铝型材/线性导轨首选；报价同步

    - order: 3
      name: 3D ContentCentral
      url: https://www.3dcontentcentral.com
      search_pattern: 'site:3dcontentcentral.com <part_name>'
      how: |
        1. WebSearch → 找零件页
        2. WebFetch → Specifications / Details tab
        3. 含 SW Toolbox 同源内容（Dassault 官方）
        4. 可下载 SolidWorks 原生 .sldprt 文件
      best_for: [fasteners, bearings, motors, electronic_modules, tooling]
      confidence_if_cited: 4
      notes: SW Toolbox 线上版，与 SW 内置库同源；厂商认证 + 社区共享混合

    - order: 4
      name: TraceParts
      url: https://www.traceparts.com
      search_pattern: 'site:traceparts.com <part_name> dimensions'
      how: |
        1. WebSearch → 找零件页
        2. WebFetch → Technical Specifications tab
        3. 支持按标准号搜索（如 ISO 4762 / DIN 912）
      best_for: [fasteners, bearings, pneumatics, hydraulics, seals, structural]
      confidence_if_cited: 4
      notes: 900+ 品牌供应商目录；覆盖 SKF/Bosch/MISUMI 等原厂数据

    - order: 5
      name: PARTcommunity by CADENAS
      url: https://b2b.partcommunity.com
      search_pattern: 'site:partcommunity.com <part_name>'
      how: |
        1. WebSearch → 找零件页
        2. WebFetch → 产品参数表（通常含完整技术规格）
        3. 可按厂商浏览（FAG / Festo / Parker / Bosch Rexroth）
      best_for: [bearings, automation, pneumatics, drive_tech, connectors]
      confidence_if_cited: 4
      notes: 500M+ 件，OEM 原厂参数；工业自动化元件覆盖最全

    - order: 6
      name: GrabCAD Community
      url: https://grabcad.com/library
      search_pattern: 'site:grabcad.com <part_name> STEP'
      how: |
        1. WebSearch → 找社区上传的 STEP 模型
        2. 下载 STEP → 导入 OCP 量取关键尺寸
        3. 结合 datasheet 交叉验证（不可仅凭 STEP）
      best_for: [servos, motors, electronic_modules, custom_parts]
      confidence_if_cited: 3
      notes: 社区模型，精度不保证；仅作参数来源时必须用官方文档二次核实

  fallback_websearch_templates:
    - '<part_name> dimensions datasheet filetype:pdf'
    - '<part_name> mechanical drawing mm specifications'
    - '<standard_number> <part_name> dimensions table'

  stop_condition: |
    按顺序查完 6 个平台仍未找到参数时：
    1. 在 data-sources YAML 写占位条目，confidence: 1，notes 注明"未找到权威源"
    2. 在 parts-lib .py 中用注释标记 "# UNVERIFIED: dimensions estimated"
    3. 向用户报告未命中，请求提供 datasheet 或实物测量值

fasteners:
  description: 螺丝、螺母、垫片、热压铜螺母等紧固件
  priority_sources:
    - name: McMaster-Carr
      url: https://www.mcmaster.com
      why: 带 CAD 下载 + 工程级尺寸表，紧固件金标准
      confidence_if_cited: 5
    - name: ISO / DIN 官方标准
      url: https://www.iso.org
      why: 螺纹规格与公差的最终权威
      confidence_if_cited: 5
    - name: Bossard Product Catalog
      url: https://www.bossard.com
      why: 欧规紧固件全表，PDF 可下载
      confidence_if_cited: 4
    - name: TraceParts Fasteners
      url: https://www.traceparts.com/en/search?Product=10-01
      why: DIN/ISO/ANSI 全系含 CAD 下载
      confidence_if_cited: 4
    - name: PARTcommunity Fasteners
      url: https://b2b.partcommunity.com
      why: Bossard/Wurth/Hilti 等 650+ 厂商目录
      confidence_if_cited: 4
  fallback_sources:
    - fastenal.com
    - mcmaster.com 的 "Product Detail" 页通常带 CAD download button
  websearch_prompts:
    - 'site:mcmaster.com <part> dimensions'
    - '"ISO 4762" M3 hex socket head cap screw dimensions'
    - '<part> DIN 912 head diameter head height hex key'
  key_params:
    - nominal_d      # 公称直径
    - pitch          # 螺距
    - head_d         # 头外径 dk
    - head_h         # 头高 k
    - hex_key        # 内六角对边 s
    - clearance_close   # 孔配合（紧）
    - clearance_medium  # 孔配合（中，FDM 推荐）
    - counterbore_d     # 沉头孔直径
    - counterbore_depth # 沉头孔深度
  extraction_hints:
    mcmaster: |
      产品页 → Specifications tab
      目标字段：Head Diameter / Head Height / Hex Key Size / Thread Pitch
      URL 规律：https://www.mcmaster.com/<catalog-number>/
    bossard: |
      产品页 → Technical Data → 下载 PDF datasheet
      表格列：d / dk / k / s（对应 nominal_d / head_d / head_h / hex_key）
    iso_table: |
      ISO 4762 标准表：d=公称径 dk=头径 k=头高 s=六角尺寸
      WebSearch: '"ISO 4762" M<size> dimensions table filetype:pdf'
    step_file: |
      导入 OCP：
      1. 量头部最大圆柱直径 → head_d
      2. 量头部高度（头顶到杆肩） → head_h
      3. 光杆直径 = nominal_d（公称）
  parts_lib_yaml_schema: |
    # 路径：parts-lib/build123d_parts_lib/parts/fasteners/<part_id_lower>.yaml
    <PART_ID>:              # 例: M3_ISO4762
      thread:
        nominal_diameter: <float mm>
        pitch: <float mm>
        unit: mm
      head:
        diameter: <float mm>   # head_d
        height:   <float mm>   # head_h
        hex_key:  <float mm>   # s
      clearance_hole:
        close_fit:  <float mm>
        medium_fit: <float mm>
        loose_fit:  <float mm>
      counterbore:
        diameter: <float mm>
        depth:    <float mm>
      common_lengths_mm: [<int list>]
  parts_lib_py_hint: |
    # 几何简化：头部圆柱 + 光杆圆柱（不建螺纹、不建内六角凹槽）
    # 坐标：Z=0 杆底面，Z=length 杆顶，Z=length+head_h 头顶
    def make_<standard>_screw(length: float = 10.0) -> Part:

