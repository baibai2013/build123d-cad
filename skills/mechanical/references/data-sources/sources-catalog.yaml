      body:
        length: <float mm>
        width:  <float mm>
        height: <float mm>
        unit: mm
      mount:
        ear_width_total: <float mm>
        ear_thickness:   <float mm>
        ear_z_offset:    <float mm>
        screw_hole_d:    <float mm>
        screw_pitch:     <float mm>
      output:
        shaft_height_from_body_top: <float mm>
        total_height: <float mm>
        spline: "<string>"
