[pytest]
# 父根 pytest 配置
# - testpaths 显式列出,避免误收集 mechanical/scripts/visual/tests(其有自己的 sys.path 约定,独立运行)
# - markers 与 07 文档 §2 对齐
testpaths =
    tests
    skills/actuator-sizing/tests
    skills/bambu-labs/tests
    skills/circuit-simulation/tests
    skills/electronics-bom/tests
    skills/fea/tests
    skills/gait-optimization/tests
    skills/gcode/tests
    skills/mechanical/tests
    skills/mujoco-simulation/tests
    skills/parts-catalog/tests
    skills/pcb/tests
    skills/pcb-mechanical-reliability/tests
    skills/requirements-verification/tests
    skills/robot-dog-digital-twin/tests
    skills/sdf/tests
    skills/sendcutsend/tests
    skills/simulation/tests
    skills/srdf/tests
    skills/urdf/tests
    skills/viewer/tests
    skills/wear-fatigue/tests

markers =
    smoke: PR 必跑的最快子集(< 60s 总耗时)
    slow: 跑超过 5 秒,nightly 才跑;默认 RUN_SLOW=0 自动 skip
    headless: 需要 PyOpenGL/EGL headless 后端
    requires_node: 需要本机 node(viewer 真起 server)
    requires_build123d: 需要 build123d/OCP 真装(benchmarks 用)
    requires_pybullet: 需要本机装 pybullet(动力学仿真真跑);缺失 importorskip 自动 skip
    p1: P1 阶段实现,P0 占位 skip
    p3: P3 阶段实现,P0 占位 skip

# importlib 模式:每个 test_*.py 独立 module,避免不同子技能下同名 test_smoke.py 冲突
# (pytest >= 6 推荐 monorepo 用)
addopts = -q -ra --strict-markers --tb=short --import-mode=importlib

python_files = test_*.py
python_classes = Test*
python_functions = test_*

xfail_strict = true
