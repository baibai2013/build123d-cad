# 最小机器狗左前腿样例 — 04 §8 / 08 §2.1 schema v1
# 用法: python skills/urdf/scripts/export_urdf.py shared/schemas/example/single_leg.joints.yaml -o /tmp/dog/
schema_version: 1
robot: dog_left_front_leg

units:
  length: m
  angle: rad
mesh_units: mm
mesh_uri_style: relative

links:
  - name: base_link
    inertial:
      mass: 0.42
      origin: {xyz: [0, 0, 0.01], rpy: [0, 0, 0]}
      inertia: {ixx: 0.001, iyy: 0.001, izz: 0.001, ixy: 0, ixz: 0, iyz: 0}

  - name: fl_hip
    inertial:
      mass: 0.18
      origin: {xyz: [0, 0, 0], rpy: [0, 0, 0]}
      inertia: {ixx: 0.0003, iyy: 0.0003, izz: 0.0001, ixy: 0, ixz: 0, iyz: 0}

  - name: fl_thigh
    inertial:
      mass: 0.25
      origin: {xyz: [0, 0, -0.06], rpy: [0, 0, 0]}
      inertia: {ixx: 0.0008, iyy: 0.0008, izz: 0.0001, ixy: 0, ixz: 0, iyz: 0}

joints:
  - name: fl_hip_joint
    type: revolute
    parent: base_link
    child: fl_hip
    origin: {xyz: [0.10, 0.05, 0], rpy: [0, 0, 0]}
    axis: [0, 0, 1]
    limit: {lower: -1.57, upper: 1.57, effort: 12, velocity: 6.0}
    positive_motion: "+Z 旋转 = 髋外展"

  - name: fl_thigh_joint
    type: revolute
    parent: fl_hip
    child: fl_thigh
    origin: {xyz: [0, 0, -0.02], rpy: [0, 0, 0]}
    axis: [0, 1, 0]
    limit: {lower: -2.0, upper: 2.0, effort: 12, velocity: 6.0}
    dynamics: {damping: 0.1, friction: 0.05}
